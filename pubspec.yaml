name: qalb
description: Islamic-inspired Heart Attack Prediction App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Network
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.5
  firebase_storage: ^11.6.5

  # AI
  google_generative_ai: ^0.4.0

  # UI & Animation
  lottie: ^3.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1

  # Localization
  easy_localization: ^3.0.7

  # Islamic Features
  adhan: ^2.0.0+1
  hijri: ^3.0.0

  # Device
  geolocator: ^11.0.0
  flutter_local_notifications: ^17.1.2
  image_picker: ^1.0.7
  share_plus: ^9.0.0
  vibration: ^2.0.1
  just_audio: ^0.9.36

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2


  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  equatable: ^2.0.5
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/translations/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  adaptive_icon_background: "#0F6E56"
  adaptive_icon_foreground: "assets/icons/logo.png"

flutter_native_splash:
  color: "#0F6E56"
  image: assets/images/splash_logo.png
  android_12: { color: "#0F6E56" }
